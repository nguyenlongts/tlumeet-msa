services:
  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-1
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data-1:/var/lib/kafka/data
    networks:
      - kafka-network
    command: |
      bash -c '
      sed -i "/KAFKA_ZOOKEEPER_CONNECT/d" /etc/confluent/docker/configure
      /etc/confluent/docker/configure
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        kafka-storage format --ignore-formatted -t $$CLUSTER_ID -c /etc/kafka/server.properties
      fi
      /etc/confluent/docker/run
      '
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-2
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data-2:/var/lib/kafka/data
    networks:
      - kafka-network
    command: |
      bash -c '
      sed -i "/KAFKA_ZOOKEEPER_CONNECT/d" /etc/confluent/docker/configure
      /etc/confluent/docker/configure
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        kafka-storage format --ignore-formatted -t $$CLUSTER_ID -c /etc/kafka/server.properties
      fi
      /etc/confluent/docker/run
      '
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:29092  || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-3
    ports:
      - "9095:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data-3:/var/lib/kafka/data
    networks:
      - kafka-network
    command: |
      bash -c '
      sed -i "/KAFKA_ZOOKEEPER_CONNECT/d" /etc/confluent/docker/configure
      /etc/confluent/docker/configure
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        kafka-storage format --ignore-formatted -t $$CLUSTER_ID -c /etc/kafka/server.properties
      fi
      /etc/confluent/docker/run
      '
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:29092  || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  gateway:
    build:
      context: ./ApiGateway
    container_name: gateway
    ports:
      - "5555:8080"
    environment:
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=TLUMeet
      - Jwt__Audience=TLUMeet
    depends_on:
      - authservice
      - meetingservice
      - notiservice
    networks:
      - kafka-network
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "14333:1433"
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - kafka-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -No -Q 'SELECT 1'",
        ]
      interval: 10s
      retries: 10
      start_period: 30s
  authservice:
    build:
      context: ./Services/AuthService
    image: authservice:${AUTH_VERSION}
    container_name: authservice
    ports:
      - "8081:8080"
    environment:
      Kafka__BootstrapServers: kafka-1:29092,kafka-2:29092,kafka-3:29092
      ConnectionStrings__AuthDB: Server=sqlserver;Database=AuthDB;User=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - kafka-network

  meetingservice:
    build:
      context: ./Services/MeetingService
    image: meetingservice:${MEETING_VERSION}
    container_name: meetingservice
    ports:
      - "8083:8080"
    environment:
      Kafka__BootstrapServers: kafka-1:29092,kafka-2:29092,kafka-3:29092
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=MeetingDB;User=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - kafka-network

  notiservice:
    build:
      context: ./Services/NotificationService
    image: notiservice:${NOTI_VERSION}
    container_name: notiservice
    ports:
      - "8082:8080"
    environment:
      Kafka__BootstrapServers: kafka-1:29092,kafka-2:29092,kafka-3:29092
      ConnectionStrings__NotificationDatabase: Server=sqlserver;Database=NotificationDB;User=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      FE__BaseUrl: http://localhost:5173
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - kafka-network

  kowl:
    image: quay.io/cloudhut/kowl:latest
    container_name: kowl
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge

volumes:
  kafka-data-1:
  kafka-data-2:
  kafka-data-3:
  sql-data:
